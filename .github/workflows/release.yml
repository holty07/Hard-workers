name: Build and Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.4)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build
        run: ./gradlew build -Pmod_version=${{ github.event.inputs.version }}
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR=$(find build/libs -name "hardworkers-*.jar" ! -name "*-sources*" ! -name "*-dev*" | head -1)
          if [ -z "$JAR" ]; then echo "No jar found!" >&2; exit 1; fi
          gh release create "v${{ github.event.inputs.version }}" \
            "$JAR#hardworkers-${{ github.event.inputs.version }}.jar" \
            --title "Hard Workers v${{ github.event.inputs.version }}" \
            --generate-notes