name: Build and Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Increment version
        id: version
        run: |
          CURRENT=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          NEW=$(python3 -c "
          parts = '$CURRENT'.split('.')
          major, minor = int(parts[0]), int(parts[1])
          minor += 1
          print(f'{major}.{minor}')
          ")
          sed -i "s/^mod_version=.*/mod_version=$NEW/" gradle.properties
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW"

      - name: Build
        run: ./gradlew build

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR=$(find build/libs -name "hardworkers-*.jar" ! -name "*-sources*" | head -1)
          gh release create "v${{ steps.version.outputs.version }}" \
            "$JAR#hardworkers-${{ steps.version.outputs.version }}.jar" \
            --title "Hard Workers v${{ steps.version.outputs.version }}" \
            --generate-notes
